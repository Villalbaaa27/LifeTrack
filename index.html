<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Macros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
    --border: #2a2a2a; --accent: #c8f557; --text: #f0f0f0;
    --muted: #666; --protein-color: #c8f557; --kcal-color: #f5a623;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* HEADER */
  header { padding: 28px 20px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; display: flex; align-items: flex-end; justify-content: space-between; }
  .logo { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .logo span { color: var(--accent); }
  .date-badge { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

  /* NAV */
  nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
  nav button { flex: 1; padding: 12px 0; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* VIEWS */
  .view { display: none; padding: 20px; }
  .view.active { display: block; }

  /* RINGS */
  .today-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
  .ring-container { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dasharray 0.6s ease; }
  .ring-kcal { stroke: var(--kcal-color); }
  .ring-protein { stroke: var(--protein-color); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .val { font-size: 16px; font-weight: 500; line-height: 1; }
  .ring-center .unit { font-size: 9px; color: var(--muted); }
  .today-stats { flex: 1; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 14px; }
  .stat-value .unit { font-size: 10px; color: var(--muted); }

  /* GOAL BARS */
  .goals-section { margin-bottom: 24px; }
  .goals-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .goal-bar-wrap { margin-bottom: 10px; }
  .goal-bar-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .goal-bar-header .goal-name { color: var(--muted); }
  .goal-bar-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .goal-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; max-width: 100%; }
  .bar-kcal { background: var(--kcal-color); }
  .bar-protein { background: var(--protein-color); }
  .goals-edit { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 10px; }
  .goals-edit-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .goal-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .goal-input-row label { font-size: 11px; color: var(--muted); flex: 1; }
  .goal-input-row input { width: 80px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 6px 8px; border-radius: 6px; text-align: right; outline: none; }

  /* LOG ITEMS */
  .section-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .log-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-cat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .log-macros { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .log-kcal { font-size: 14px; color: var(--kcal-color); }
  .log-protein { font-size: 11px; color: var(--protein-color); }

  /* FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 14px; padding: 10px 12px; border-radius: 8px; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .btn-submit { width: 100%; background: var(--accent); color: #0a0a0a; border: none; padding: 14px; border-radius: 10px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn-submit:active { transform: scale(0.98); opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); font-size: 11px; padding: 8px 6px; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .cat-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(200,245,87,0.08); }

  /* HISTORY */
  .history-date-group { margin-bottom: 24px; }
  .history-date-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .kcal-tot { color: var(--kcal-color); }
  .prot-tot { color: var(--protein-color); margin-left: 8px; }

  /* ENTRENAMIENTOS */
  .workout-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .workout-month-nav { display: flex; align-items: center; gap: 12px; }
  .month-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-label { font-family: var(--font-display); font-size: 16px; font-weight: 700; min-width: 130px; text-align: center; }
  .workout-stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .workout-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .workout-stat .ws-val { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--accent); }
  .workout-stat .ws-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
  .cal-day-name { text-align: center; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 4px; }
  .cal-day { aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: all 0.15s; position: relative; user-select: none; }
  .cal-day:active { transform: scale(0.9); }
  .cal-day.empty { background: none; border-color: transparent; cursor: default; }
  .cal-day.trained { background: var(--accent); border-color: var(--accent); color: #0a0a0a; font-weight: 700; }
  .cal-day.today-marker { border-color: var(--kcal-color); }
  .cal-day.trained.today-marker { box-shadow: 0 0 0 2px var(--kcal-color); }
  .cal-legend { display: flex; gap: 16px; font-size: 10px; color: var(--muted); margin-top: 10px; }
  .cal-legend span { display: flex; align-items: center; gap: 5px; }
  .cal-legend .dot { width: 8px; height: 8px; border-radius: 50%; }
  .cal-legend .dot.trained { background: var(--accent); }
  .cal-legend .dot.empty-dot { background: var(--surface2); border: 1px solid var(--border); }
  .saving-indicator { font-size: 10px; color: var(--muted); text-align: right; margin-top: 6px; min-height: 14px; transition: opacity 0.3s; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: #f55; color: #f55; }

  /* LOADING / EMPTY */
  .loading { text-align: center; color: var(--muted); font-size: 12px; padding: 30px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; color: var(--muted); font-size: 12px; padding: 40px 20px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* DOT COLORS */
  .dot-desayuno { background: #f5a623; }
  .dot-almuerzo { background: #c8f557; }
  .dot-cena { background: #57c8f5; }
  .dot-snack { background: #f557c8; }
  .dot-pre-entreno { background: #c857f5; }
  .dot-post-entreno { background: #f5c857; }
  .dot-otro { background: #888; }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 40px 20px; }
  #login-screen .login-logo { font-family: var(--font-display); font-size: 42px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
  #login-screen .login-logo span { color: var(--accent); }
  #login-screen .login-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 48px; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 36px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: #f55; border-color: #f55; }
  .numpad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .numpad-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-display); font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; }
  .numpad-btn:active { transform: scale(0.92); }
  .numpad-btn.del { font-size: 18px; color: var(--muted); }
  .numpad-btn.empty { background: none; border: none; cursor: default; }
  .login-error { margin-top: 20px; font-size: 11px; color: #f55; opacity: 0; transition: opacity 0.2s; text-transform: uppercase; letter-spacing: 0.08em; }
  .login-error.show { opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">ma<span>c</span>ros</div>
  <div class="login-sub">Introduce tu PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="numpad">
    <button class="numpad-btn" onclick="pinPress('1')">1</button>
    <button class="numpad-btn" onclick="pinPress('2')">2</button>
    <button class="numpad-btn" onclick="pinPress('3')">3</button>
    <button class="numpad-btn" onclick="pinPress('4')">4</button>
    <button class="numpad-btn" onclick="pinPress('5')">5</button>
    <button class="numpad-btn" onclick="pinPress('6')">6</button>
    <button class="numpad-btn" onclick="pinPress('7')">7</button>
    <button class="numpad-btn" onclick="pinPress('8')">8</button>
    <button class="numpad-btn" onclick="pinPress('9')">9</button>
    <button class="numpad-btn empty"></button>
    <button class="numpad-btn" onclick="pinPress('0')">0</button>
    <button class="numpad-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="login-error" id="login-error">PIN incorrecto</div>
</div>

<header>
  <div class="logo">ma<span>c</span>ros</div>
  <div class="date-badge" id="header-date"></div>
</header>

<nav>
  <button class="active" onclick="showView('today')">Hoy</button>
  <button onclick="showView('add')">+ Añadir</button>
  <button onclick="showView('workout')">Entrenos</button>
  <button onclick="showView('history')">Historial</button>
</nav>

<!-- TODAY -->
<div class="view active" id="view-today">
  <div class="today-header">
    <div class="ring-container">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="32"/>
        <circle class="ring-fill ring-kcal" id="ring-kcal-fill" cx="40" cy="40" r="32" stroke-dasharray="0 201"/>
      </svg>
      <div class="ring-center">
        <div class="val" id="today-kcal-val" style="color:var(--kcal-color)">0</div>
        <div class="unit">kcal</div>
      </div>
    </div>
    <div class="ring-container">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="32"/>
        <circle class="ring-fill ring-protein" id="ring-protein-fill" cx="40" cy="40" r="32" stroke-dasharray="0 201"/>
      </svg>
      <div class="ring-center">
        <div class="val" id="today-prot-val" style="color:var(--protein-color)">0</div>
        <div class="unit">prot g</div>
      </div>
    </div>
    <div class="today-stats">
      <div class="stat-row">
        <span class="stat-label">Comidas</span>
        <span class="stat-value" id="today-count">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Kcal resto</span>
        <span class="stat-value" id="today-kcal-left">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Prot. resto</span>
        <span class="stat-value" id="today-prot-left">—</span>
      </div>
    </div>
  </div>

  <div class="goals-section">
    <div class="goals-title">Objetivos del día</div>
    <div class="goal-bar-wrap">
      <div class="goal-bar-header">
        <span class="goal-name">Calorías</span>
        <span id="bar-kcal-label" style="color:var(--kcal-color)">0 / 2000 kcal</span>
      </div>
      <div class="goal-bar-track"><div class="goal-bar-fill bar-kcal" id="bar-kcal" style="width:0%"></div></div>
    </div>
    <div class="goal-bar-wrap">
      <div class="goal-bar-header">
        <span class="goal-name">Proteína</span>
        <span id="bar-prot-label" style="color:var(--protein-color)">0 / 150 g</span>
      </div>
      <div class="goal-bar-track"><div class="goal-bar-fill bar-protein" id="bar-prot" style="width:0%"></div></div>
    </div>
    <div class="goals-edit">
      <div class="goals-edit-title">Editar objetivos</div>
      <div class="goal-input-row">
        <label>Calorías objetivo</label>
        <input type="number" id="goal-kcal" value="2000" min="0" oninput="saveGoals();updateTodayView()">
      </div>
      <div class="goal-input-row">
        <label>Proteína objetivo (g)</label>
        <input type="number" id="goal-prot" value="150" min="0" oninput="saveGoals();updateTodayView()">
      </div>
    </div>
  </div>

  <div class="section-title">Registros de hoy</div>
  <div class="log-list" id="today-log-list">
    <div class="loading"><span class="spinner"></span>Cargando...</div>
  </div>
</div>

<!-- ADD -->
<div class="view" id="view-add">
  <div class="form-card">
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="form-date">
    </div>
    <div class="form-group">
      <label>Categoría</label>
      <div class="cat-grid">
        <button class="cat-btn selected" data-cat="Desayuno" onclick="selectCat(this)">🌅 Desayuno</button>
        <button class="cat-btn" data-cat="Almuerzo" onclick="selectCat(this)">☀️ Almuerzo</button>
        <button class="cat-btn" data-cat="Cena" onclick="selectCat(this)">🌙 Cena</button>
        <button class="cat-btn" data-cat="Snack" onclick="selectCat(this)">🍎 Snack</button>
        <button class="cat-btn" data-cat="Pre-entreno" onclick="selectCat(this)">⚡ Pre</button>
        <button class="cat-btn" data-cat="Post-entreno" onclick="selectCat(this)">💪 Post</button>
      </div>
    </div>
    <div class="form-group">
      <label>Alimento</label>
      <input type="text" id="form-food" placeholder="ej. Pechuga de pollo 200g" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Calorías (kcal)</label>
        <input type="number" id="form-kcal" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Proteína (g)</label>
        <input type="number" id="form-prot" placeholder="0" min="0" step="0.1">
      </div>
    </div>
    <button class="btn-submit" id="btn-add" onclick="addEntry()">Guardar entrada</button>
  </div>
</div>

<!-- WORKOUT -->
<div class="view" id="view-workout">
  <div class="workout-header">
    <div class="workout-month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="workout-stats-row">
    <div class="workout-stat">
      <div class="ws-val" id="ws-count">0</div>
      <div class="ws-label">Entrenos</div>
    </div>
    <div class="workout-stat">
      <div class="ws-val" id="ws-week">0</div>
      <div class="ws-label">Esta semana</div>
    </div>
    <div class="workout-stat">
      <div class="ws-val" id="ws-pct">0%</div>
      <div class="ws-label">Del mes</div>
    </div>
  </div>
  <div class="cal-grid" id="cal-day-names"></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend">
    <span><div class="dot trained"></div> Entrenado</span>
    <span><div class="dot empty-dot"></div> Sin entreno</span>
  </div>
  <div class="saving-indicator" id="saving-indicator"></div>
</div>

<!-- HISTORY -->
<div class="view" id="view-history">
  <div class="section-title">Historial completo</div>
  <div id="history-container">
    <div class="loading"><span class="spinner"></span>Cargando...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwd-RidhtRY9ILAOpU9YThPteI_k5sbbuV--hrcLooXsNmieeEBILt9x-hFt6_jioHU/exec';
const CIRC = 2 * Math.PI * 32;

let allEntries = [];
let trainedDays = {}; // { "2025-06": [1,5,12,...], ... }
let goals = { kcal: 2000, prot: 150 };
let selectedCat = 'Desayuno';
let calYear, calMonth;

// ── HELPERS DE FECHA ─────────────────────────
// ARREGLO CLAVE: normaliza cualquier formato de fecha a "YYYY-MM-DD"
function normalizeFecha(val) {
  if (!val) return '';
  // Si ya es string con formato fecha
  if (typeof val === 'string') {
    // Puede venir como "2025-06-10", "10/06/2025", "Jun 10, 2025", etc.
    // Intentamos parsear
    const d = new Date(val);
    if (!isNaN(d)) return toLocalDateStr(d);
    return val.substring(0, 10);
  }
  // Si es número (serial de Excel/Sheets)
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return toLocalDateStr(d);
  }
  // Si ya es Date
  if (val instanceof Date) return toLocalDateStr(val);
  return String(val).substring(0, 10);
}

function toLocalDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function todayStr() { return toLocalDateStr(new Date()); }

function monthKey(y, m) {
  return y + '-' + String(m + 1).padStart(2, '0');
}

// ── INIT ─────────────────────────────────────
function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  document.getElementById('header-date').textContent =
    now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('form-date').value = todayStr();

  const saved = localStorage.getItem('macro_goals');
  if (saved) {
    goals = JSON.parse(saved);
    document.getElementById('goal-kcal').value = goals.kcal;
    document.getElementById('goal-prot').value = goals.prot;
  }

  const savedTraining = localStorage.getItem('macro_training');
  if (savedTraining) trainedDays = JSON.parse(savedTraining);

  renderCalDayNames();
  fetchAll();
}

// ── FETCH ─────────────────────────────────────
async function fetchAll() {
  try {
    const res = await fetch(API + '?action=get');
    const data = await res.json();

    // Separar entradas de comida vs entrenamientos
    const raw = Array.isArray(data) ? data : (data.data || []);
    allEntries = [];
    trainedDays = {};

    raw.forEach(row => {
      if (row.tipo === 'entreno') {
        // formato: { tipo:'entreno', fecha:'2025-06-10' }
        const f = normalizeFecha(row.fecha);
        const mk = f.substring(0, 7);
        const day = parseInt(f.substring(8, 10));
        if (!trainedDays[mk]) trainedDays[mk] = [];
        if (!trainedDays[mk].includes(day)) trainedDays[mk].push(day);
      } else {
        // entrada de comida normal
        const entry = { ...row, fecha: normalizeFecha(row.fecha) };
        allEntries.push(entry);
      }
    });

    localStorage.setItem('macro_training', JSON.stringify(trainedDays));
    updateTodayView();
    updateHistoryView();
    renderCalendar();
  } catch(e) {
    console.error(e);
    showToast('Error al cargar datos', 'error');
    document.getElementById('today-log-list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>No se pudieron cargar los datos</div>';
  }
}

// ── TODAY (ARREGLADO) ─────────────────────────
function updateTodayView() {
  const today = todayStr();

  // DEBUG: log para ver qué fechas hay
  console.log('Hoy es:', today);
  console.log('Primeras entradas:', allEntries.slice(0, 3).map(e => e.fecha));

  const entries = allEntries.filter(e => e.fecha === today);
  console.log('Entradas de hoy:', entries.length);

  const totalKcal = entries.reduce((s, e) => s + (parseFloat(e.kcal) || 0), 0);
  const totalProt = entries.reduce((s, e) => s + (parseFloat(e.proteina) || 0), 0);

  goals.kcal = parseFloat(document.getElementById('goal-kcal').value) || 2000;
  goals.prot = parseFloat(document.getElementById('goal-prot').value) || 150;

  const pKcal = Math.min(totalKcal / goals.kcal, 1);
  document.getElementById('ring-kcal-fill').setAttribute('stroke-dasharray', `${pKcal * CIRC} ${CIRC}`);
  document.getElementById('today-kcal-val').textContent = Math.round(totalKcal);

  const pProt = Math.min(totalProt / goals.prot, 1);
  document.getElementById('ring-protein-fill').setAttribute('stroke-dasharray', `${pProt * CIRC} ${CIRC}`);
  document.getElementById('today-prot-val').textContent = Math.round(totalProt);

  document.getElementById('today-count').textContent = entries.length;
  document.getElementById('today-kcal-left').innerHTML =
    `${Math.round(goals.kcal - totalKcal)} <span class="unit">kcal</span>`;
  document.getElementById('today-prot-left').innerHTML =
    `${(goals.prot - totalProt).toFixed(1)} <span class="unit">g</span>`;
  document.getElementById('bar-kcal').style.width = (pKcal * 100) + '%';
  document.getElementById('bar-prot').style.width = (pProt * 100) + '%';
  document.getElementById('bar-kcal-label').textContent =
    `${Math.round(totalKcal)} / ${goals.kcal} kcal`;
  document.getElementById('bar-prot-label').textContent =
    `${totalProt.toFixed(1)} / ${goals.prot} g`;

  const list = document.getElementById('today-log-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🍽️</div>Sin registros hoy.<br>Añade tu primera comida.</div>';
    return;
  }
  list.innerHTML = entries.slice().reverse().map(logItemHTML).join('');
}

function logItemHTML(e) {
  const cat = (e.categoria || 'otro').toLowerCase();
  const dotClass = 'dot-' + cat.replace(/\s+/g, '-');
  return `<div class="log-item">
    <div class="log-cat-dot ${dotClass}"></div>
    <div class="log-info">
      <div class="log-name">${e.alimento || '—'}</div>
      <div class="log-cat-label">${e.categoria || ''}</div>
    </div>
    <div class="log-macros">
      <div class="log-kcal">${Math.round(e.kcal || 0)} kcal</div>
      <div class="log-protein">${parseFloat(e.proteina || 0).toFixed(1)}g prot</div>
    </div>
  </div>`;
}

// ── HISTORY ───────────────────────────────────
function updateHistoryView() {
  const container = document.getElementById('history-container');
  if (!allEntries.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Sin datos aún</div>';
    return;
  }
  const groups = {};
  allEntries.forEach(e => {
    const d = e.fecha;
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });
  const dates = Object.keys(groups).sort().reverse();
  container.innerHTML = dates.map(date => {
    const ents = groups[date];
    const totK = ents.reduce((s, e) => s + (parseFloat(e.kcal) || 0), 0);
    const totP = ents.reduce((s, e) => s + (parseFloat(e.proteina) || 0), 0);
    return `<div class="history-date-group">
      <div class="history-date-label">
        <span>${formatDate(date)}</span>
        <span><span class="kcal-tot">${Math.round(totK)} kcal</span><span class="prot-tot">${totP.toFixed(1)}g prot</span></span>
      </div>
      <div class="log-list">${ents.slice().reverse().map(logItemHTML).join('')}</div>
    </div>`;
  }).join('');
}

function formatDate(str) {
  const d = new Date(str + 'T12:00:00');
  if (str === todayStr()) return 'Hoy';
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  if (str === toLocalDateStr(yest)) return 'Ayer';
  return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ── ADD ENTRY ─────────────────────────────────
function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
}

async function addEntry() {
  const fecha = document.getElementById('form-date').value;
  const alimento = document.getElementById('form-food').value.trim();
  const kcal = parseFloat(document.getElementById('form-kcal').value) || 0;
  const proteina = parseFloat(document.getElementById('form-prot').value) || 0;

  if (!alimento) { showToast('Escribe el alimento', 'error'); return; }
  if (!fecha) { showToast('Selecciona una fecha', 'error'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const params = new URLSearchParams({
    action: 'add', tipo: 'comida',
    fecha, categoria: selectedCat, alimento, kcal, proteina
  });

  try {
    await fetch(API + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    allEntries.push({ fecha, categoria: selectedCat, alimento, kcal, proteina });
    updateTodayView();
    updateHistoryView();
    showToast('✓ Guardado', 'success');
    document.getElementById('form-food').value = '';
    document.getElementById('form-kcal').value = '';
    document.getElementById('form-prot').value = '';
    setTimeout(() => showView('today'), 600);
  } catch(e) {
    showToast('Error al guardar', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar entrada';
  }
}

// ── GOALS ─────────────────────────────────────
function saveGoals() {
  goals.kcal = parseFloat(document.getElementById('goal-kcal').value) || 2000;
  goals.prot = parseFloat(document.getElementById('goal-prot').value) || 150;
  localStorage.setItem('macro_goals', JSON.stringify(goals));
}

// ── CALENDARIO ENTRENAMIENTOS ─────────────────
function renderCalDayNames() {
  const names = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
  document.getElementById('cal-day-names').innerHTML =
    names.map(n => `<div class="cal-day-name">${n}</div>`).join('');
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const mk = monthKey(calYear, calMonth);
  const trained = trainedDays[mk] || [];
  const today = new Date();
  const isCurrentMonth = (calYear === today.getFullYear() && calMonth === today.getMonth());
  const todayDay = today.getDate();

  // Nombre del mes
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('month-label').textContent = `${monthNames[calMonth]} ${calYear}`;

  // Días en el mes
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  // Primer día de la semana (0=Dom, ajustar a Lun=0)
  let firstDay = new Date(calYear, calMonth, 1).getDay();
  firstDay = (firstDay === 0) ? 6 : firstDay - 1; // convertir a Lun=0

  // Stats
  document.getElementById('ws-count').textContent = trained.length;
  document.getElementById('ws-pct').textContent =
    Math.round((trained.length / daysInMonth) * 100) + '%';

  // Entrenos esta semana
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  let weekCount = 0;
  if (isCurrentMonth) {
    trained.forEach(d => {
      const date = new Date(calYear, calMonth, d);
      if (date >= weekStart && date <= today) weekCount++;
    });
  }
  document.getElementById('ws-week').textContent = weekCount;

  // Grid
  let html = '';
  // Celdas vacías al inicio
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isTrained = trained.includes(d);
    const isToday = isCurrentMonth && d === todayDay;
    let cls = 'cal-day';
    if (isTrained) cls += ' trained';
    if (isToday) cls += ' today-marker';
    html += `<div class="${cls}" onclick="toggleDay(${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

let saveTimer;
async function toggleDay(day) {
  const mk = monthKey(calYear, calMonth);
  if (!trainedDays[mk]) trainedDays[mk] = [];

  const idx = trainedDays[mk].indexOf(day);
  const adding = idx === -1;

  if (adding) {
    trainedDays[mk].push(day);
  } else {
    trainedDays[mk].splice(idx, 1);
  }

  localStorage.setItem('macro_training', JSON.stringify(trainedDays));
  renderCalendar();

  // Guardar en Sheets con debounce (espera 1s tras el último toque)
  clearTimeout(saveTimer);
  const ind = document.getElementById('saving-indicator');
  ind.textContent = 'Guardando...';
  saveTimer = setTimeout(async () => {
    const fecha = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    const accion = adding ? 'add_entreno' : 'remove_entreno';
    const params = new URLSearchParams({ action: accion, fecha, tipo: 'entreno' });
    try {
      await fetch(API + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
      ind.textContent = '✓ Guardado';
      setTimeout(() => ind.textContent = '', 2000);
    } catch(e) {
      ind.textContent = 'Error al guardar';
    }
  }, 1000);
}

// ── NAV ───────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['today', 'add', 'workout', 'history'].indexOf(name);
  document.querySelectorAll('nav button')[idx].classList.add('active');
  if (name === 'workout') renderCalendar();
}

// ── TOAST ─────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── LOGIN ─────────────────────────────────────
const PIN = "1220";
let pinEntry = "";

function pinPress(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updateDots();
  if (pinEntry.length === 4) checkPin();
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("dot-" + i);
    dot.classList.toggle("filled", i < pinEntry.length);
    dot.classList.remove("error");
  }
}

function checkPin() {
  if (pinEntry === PIN) {
    sessionStorage.setItem("macro_auth", "1");
    document.getElementById("login-screen").style.display = "none";
    init();
  } else {
    for (let i = 0; i < 4; i++) document.getElementById("dot-" + i).classList.add("error");
    document.getElementById("login-error").classList.add("show");
    setTimeout(() => {
      pinEntry = "";
      updateDots();
      document.getElementById("login-error").classList.remove("show");
    }, 900);
  }
}

if (sessionStorage.getItem("macro_auth") === "1") {
  document.getElementById("login-screen").style.display = "none";
  init();
}
</script>
